<!-- Conteneur principal avec image de fond -->
<div class="home-container">

  <div class="content">
    
    <!-- Titre principal de la page -->
    <h1>Bienvenue dans bibliothèque en ligne</h1>

    <!-- Bouton de connexion -->
    <!-- (click)="goToLogin()" : appel la méthode goToLogin() au clic -->
    <button class="btn login-btn" (click)="goToLogin()">
      Se connecter
    </button>

    <!-- Bouton "À propos" -->
    <!-- (click)="openAbout()" : affiche la fenêtre modale -->
    <button class="btn about-btn" (click)="openAbout()">
      À propos
    </button>

  </div>

</div>

<!-- Fenêtre modale (popup) -->
<!-- *ngIf="showAbout" : n'affiche la fenêtre que si showAbout est true -->
<div class="modal" *ngIf="showAbout">

  <div class="modal-content">

    <h2>À propos</h2>

    <p>
      Cette application est une bibliotheque en ligne
    </p>

    <!-- Bouton pour fermer la fenêtre -->
    <!-- (click)="closeAbout()" : ferme la fenêtre modale -->
    <button (click)="closeAbout()">Fermer</button>

  </div>

</div>

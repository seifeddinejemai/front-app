<div class="form-container">
  <h2>{{ isEditMode ? 'Modifier un livre' : 'Ajouter un livre' }}</h2>

  <form (ngSubmit)="onSubmit(bookForm)" #bookForm="ngForm">

    <!-- ID - visible seulement en mode modification -->
    @if (isEditMode) {
    <div class="form-group">
      <label for="id">ID</label>
      <input type="text" id="id" name="id" class="form-control" [(ngModel)]="book.id" readonly disabled />
    </div>
    }

    <!-- Titre - champ obligatoire -->
    <div class="form-group">
      <label for="titre">Titre *</label>
      <input type="text" id="titre" name="titre" class="form-control" [(ngModel)]="book.titre" required
        #titre="ngModel" />
      @if (titre.invalid && titre.touched) {
      <div class="error">
        Le titre est obligatoire
      </div>
      }
    </div>

    <!-- Auteur - champ obligatoire -->
    <div class="form-group">
      <label for="auteur">Auteur *</label>
      <input type="text" id="auteur" name="auteur" class="form-control" [(ngModel)]="book.auteur" required
        #auteur="ngModel" />
      @if (auteur.invalid && auteur.touched) {
      <div class="error">
        L'auteur est obligatoire
      </div>
      }
    </div>

    <!-- Pays - champ optionnel -->
    <div class="form-group">
      <label for="pays">Pays</label>
      <input type="text" id="pays" name="pays" class="form-control" [(ngModel)]="book.pays" />
    </div>

    <!-- Année - champ optionnel -->
    <div class="form-group">
      <label for="annee">Année</label>
      <input type="number" id="annee" name="annee" class="form-control" [(ngModel)]="book.annee" />
    </div>

    <!-- Boutons d'action -->
    <div class="actions">
      <button type="submit" class="btn-submit" [disabled]="bookForm.invalid">
        {{ isEditMode ? 'Mettre à jour' : 'Ajouter' }}
      </button>

      <button type="button" class="btn-cancel" (click)="onCancel()">
        Annuler
      </button>
    </div>

  </form>
</div>

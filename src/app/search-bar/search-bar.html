<div id="search-bar">
  <!-- Champ de recherche -->
  <!-- [ngModel]="search()" : liaison de données (parent vers enfant) -->
  <!-- (ngModelChange)="updateSearch($event)" : événement quand le texte change (enfant vers parent) -->
  <input 
    placeholder="Search..." 
    [ngModel]="search()" 
    (ngModelChange)="updateSearch($event)"
  />
  
  <!-- Bouton de recherche -->
  <!-- (click)="searchClick()" : appelle la méthode searchClick() -->
  <button (click)="searchClick()"></button>
</div>
